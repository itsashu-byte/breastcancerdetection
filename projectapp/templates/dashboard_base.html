{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Breast Cancer Detection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

body{
background:#0b1020;
color:white;
font-family:Arial;
}

.sidebar{
height:100vh;
position:fixed;
width:240px;
background:#050714;
padding-top:20px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
font-weight:500;
}

.sidebar a:hover{
background:#1b1f3b;
}

.main{
margin-left:240px;
padding:30px;
}

.profile-img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="text-center mb-4">
<img src="{% static 'projectapp/logo.png' %}" width="80">
<h5 class="mt-2">AI Detection</h5>
</div>

<a href="{% url 'dashboard' %}">
<i class="fa fa-home"></i> Dashboard
</a>

<a href="{% url 'upload_mammogram' %}">
<i class="fa fa-upload"></i> Upload Mammogram
</a>

<a href="{% url 'dashboard' %}">
<i class="fa fa-notes-medical"></i> Symptoms
</a>

<a href="{% url 'dashboard' %}">
<i class="fa fa-chart-line"></i> Prediction History
</a>

<a href="#">
<i class="fa fa-file-pdf"></i> Medical Report
</a>

<a href="{% url 'logout' %}">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>

<!-- Main Content -->

<div class="main">

{% block content %}

{% endblock %}

</div>

</html>
